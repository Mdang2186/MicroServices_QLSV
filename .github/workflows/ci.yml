name: Microservices CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    name: Build & Verify
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "sqlserver://localhost:1433;database=student_db;user=sa;password=CiPassword123;encrypt=DANGER_PLAINTEXT;trustServerCertificate=true;"
      REDIS_URL: "redis://localhost:6379"
      JWT_SECRET: "ci-test-secret"
      NEXT_TELEMETRY_DISABLED: "1"
      TURBO_TELEMETRY_DISABLED: "1"

    strategy:
      matrix:
        node-version: [18.x]

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Generate Prisma Client
      run: npm run db:generate

    - name: Lint Codebase
      run: npm run lint
      continue-on-error: true # Cho phép bypass nếu lint có issue (tuỳ chọn)

    - name: Build All Microservices & Frontends (Turborepo)
      run: npm run build

  postman-api-test:
    name: Postman Auto Tests (Newman)
    runs-on: ubuntu-latest
    needs: build-and-test
    
    # Bước này mặc định chạy với một Mock Server hoặc Staging Server.
    # Nếu bạn muốn giả lập toàn bộ Database và Microservices trên GitHub Actions 
    # thì cần setup SQL Server Container và chạy nền (background) các services.
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'

    - name: Install Newman (Postman CLI)
      run: npm install -g newman

    - name: Run Postman Collection against Staging URL
      # Lưu ý: Cần đổi biến base_url trong file collection hoặc truyền qua --env-var
      # Ở đây mình demo gọi thẳng file JSON vừa được tạo để Github Actions quét qua nó.
      run: |
        echo "Lưu ý: Để test thật, bạn cần deploy code lên một server (ví dụ Render, AWS)"
        echo "Sau đó truyền URL vào Newman bằng lệnh: newman run collection.json --env-var base_url=https://congminh-staging.com"
        # Bỏ comment dòng dưới để chạy thực tế nếu đã có server staging
        # newman run UNETI_Auto_Test.postman_collection.json --env-var base_url=${{ secrets.STAGING_URL }}
